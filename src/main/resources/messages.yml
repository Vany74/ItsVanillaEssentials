  received: "&e{player} &fsouhaite se téléporter à vous. &a/tpaccept &7ou &c/tpdeny"
  accepted-requester: "&aTéléportation acceptée par &e{player}&a !"
  # {player}
  accepted-target: "&aVous avez accepté la demande de &e{player}&a."
  # {player}
  denied-requester: "&cVotre demande a été refusée par &e{player}&c."
  denied-target: "&cDemande refusée."
  expired-requester: "&cVotre demande de tp a expiré."
  none-pending: "&cAucune demande de téléportation en attente."
  offline: "&cCe joueur n'est plus connecté."
