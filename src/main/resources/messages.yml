# ─── COMMAND BLOCKER ──────────────────────────────────────
command-blocker:
  # {command} = la commande bloquée
  blocked-message: "&cLa commande &e/{command} &cest bloquée sur ce serveur."
  # Message envoyé aux admins (permission core.commandblocker.notify) quand un joueur tente une commande bloquée
  # {player} {command}
  notify-message: "&8[CB] &e{player} &fa tenté d'utiliser &c/{command}"
