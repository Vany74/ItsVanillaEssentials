# ─── MESSAGES PRIVÉS ──────────────────────────────────────
msg:
  # {from} {to} {message}
  format: "&7[&fMP&7] &e{from} &7→ &e{to}&7: &f{message}"
  socialspy-format: "&8[SocialSpy] &7[&fMP&7] &e{from} &7→ &e{to}&7: &f{message}"
  no-reply: "&cAucun message récent à qui répondre."
  target-offline: "&cCe joueur n'est plus connecté."
  socialspy-on: "&fSocialSpy : &aACTIVÉ"
  socialspy-off: "&fSocialSpy : &cDÉSACTIVÉ"

# ─── MODÉRATION ───────────────────────────────────────────
moderation:
  muted: "&cVous êtes muet(e)."
  # {player} {duration}
  mute-sender: "&e{player} &fmuté(e) &7({duration})&f."
  # {duration}
  mute-target: "&cVous avez été rendu(e) muet(te) &7({duration})&c."
  unmute-sender: "&e{player} &adémuté(e)."
  unmute-target: "&aVous n'êtes plus muet(e)."
  not-muted: "&e{player} &cn'est pas muté(e)."
  # {player} {reason}
  kick-broadcast: "&e{player} &ca été expulsé(e). &7({reason})"
  kick-message: "&cVous avez été expulsé(e).\n&7Raison : &e{reason}"
  # {player} {reason}
  ban-broadcast: "&c{player} &fa été banni(e). &7({reason})"
  ban-message: "&cVous avez été banni(e).\n&7Raison : &e{reason}"
  # {player} {duration} {reason}
  tempban-broadcast: "&c{player} &fbanni(e) pour &e{duration}&7. ({reason})"
  tempban-message: "&cBan temporaire : &e{duration}\n&7Raison : &e{reason}"
  unban-success: "&e{player} &adébanni(e)."
  not-banned: "&e{player} &cn'est pas banni(e)."
  # {count} {reason}
  warn-target: "&c⚠ Avertissement #{count} : &e{reason}"
  # {player} {count}
  warn-sender: "&e{player} &aavert i(e) &7({count} avert. total)."
  # {player} {reason}
  warn-broadcast: "&e{player} &ca reçu un avertissement. &7({reason})"
  warnings-header: "&6Avertissements de &e{player} &7({count}) &6:"
  warnings-entry: "  &7#{num} &cpar &f{by} &7- &e{reason}"
  warnings-empty: "&e{player} &fn'a aucun avertissement."
  clear-warnings-sender: "&aAvertissements de &e{player} &aeffacés."
  clear-warnings-target: "&aVos avertissements ont été effacés."

