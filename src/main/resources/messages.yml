# ─── GÉNÉRAL ──────────────────────────────────────────────
prefix: "&8[&6Core&8] &r"
no-permission: "&cVous n'avez pas la permission d'utiliser cette commande."
player-only: "&cCette commande est réservée aux joueurs."
player-not-found: "&cJoueur &e{player} &cintrouvable ou hors ligne."
invalid-number: "&cNombre invalide: &e{input}&c."
console-sender: "Console"

# ─── TÉLÉPORTATION ────────────────────────────────────────
teleport:
  # {delay} = secondes restantes
  countdown: "&eTéléportation dans &6{delay} &eseconde(s)... Ne bougez pas !"
  success: "&aTéléporté(e) avec succès !"
  cancelled: "&cTéléportation annulée car vous avez bougé."
  no-back: "&cAucune position précédente enregistrée."
  back-success: "&aRetour à votre dernière position."
  rtp-searching: "&eRecherche d'une position aléatoire..."
  # {x} {y} {z}
  rtp-success: "&aTéléporté(e) aléatoirement en &e{x}&a, &e{y}&a, &e{z}&a !"
  rtp-failed: "&cImpossible de trouver une position valide. Réessayez."
  no-spawn: "&cLe spawn n'est pas défini. Utilisez &f/setspawn&c."
  spawn-success: "&aTéléporté(e) au spawn !"
  spawn-set: "&aSpawn défini à votre position actuelle !"

# ─── HOME ─────────────────────────────────────────────────
home:
  # {home} = nom du home
  teleported: "&aTéléporté(e) au home &e{home}&a."
  not-found: "&cHome &e{home} &cintrouvable. Utilisez &f/homes &cpour la liste."
  set: "&aHome &e{home} &adéfini !"
  deleted: "&aHome &e{home} &asupprimé."
  delete-not-found: "&cHome &e{home} &cintrouvable."
  # {count} {max}
  limit-reached: "&cVous avez atteint la limite de &e{max} &chomes."
  # {count} {max}
  list-header: "&6Vos homes &7({count}/{max})&6 :"
  list-entry: "  &7- &e{home}"
  list-empty: "&cVous n'avez aucun home. Utilisez &f/sethome <nom>&c."

# ─── WARP ─────────────────────────────────────────────────
warp:
  # {warp}
  teleported: "&aTéléporté(e) au warp &e{warp}&a."
  not-found: "&cWarp &e{warp} &cintrouvable."
  set: "&aWarp &e{warp} &acréé !"
  deleted: "&aWarp &e{warp} &asupprimé."
  delete-not-found: "&cWarp &e{warp} &cintrouvable."
  list-header: "&6Warps disponibles :"
  # {warps} = liste séparée par des virgules
  list: "&e{warps}"
  list-empty: "&cAucun warp disponible."

# ─── TPA ──────────────────────────────────────────────────
tpa:
  # {player}
  sent: "&aDemande de téléportation envoyée à &e{player}&a."
